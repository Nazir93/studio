worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    client_max_body_size 20M;

    server_tokens off;

    upstream nextjs {
        server nextjs:3000;
    }

    # HTTP: проверка Let's Encrypt (webroot) + прокси на Next.js
    # После выпуска сертификата можно включить редирект на HTTPS — см. README-RU.md
    server {
        listen 80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            allow all;
        }

        include /etc/nginx/snippets/proxy-nextjs.conf;
    }

    # HTTPS (положите fullchain.pem и privkey.pem в ./nginx/ssl/ на хосте)
    server {
        listen 443 ssl http2;
        server_name _;

        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:10m;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        include /etc/nginx/snippets/proxy-nextjs.conf;
    }
}
