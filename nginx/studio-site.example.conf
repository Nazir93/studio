# Пример для Nginx на ХОСТЕ (без Docker): положить в /etc/nginx/sites-available/studio
# и включить: ln -s ... sites-enabled/studio; nginx -t && systemctl reload nginx
#
# Next.js слушает 127.0.0.1:3000 (systemd), снаружи — только 80/443 у Nginx.

upstream studio_nextjs {
    server 127.0.0.1:3000;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name code1618.ru www.code1618.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        proxy_pass http://studio_nextjs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# После certbot --nginx появится второй server { listen 443 ssl; ... }
# или вручную добавьте ssl_certificate из /etc/letsencrypt/live/...
